<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>3D Minimal Maze - Modern Mobile Controls</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            color: white;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #timer {
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Landscape lock overlay */
        #rotate-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            color: white;
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            text-align: center;
        }
        #rotate-overlay .icon { font-size: 4rem; animation: spin 1.5s infinite; }
        @keyframes spin {
            0%   { transform: rotate(0deg); }
            50%  { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }

        @media screen and (orientation: portrait) {
            #rotate-overlay { display: flex !important; }
            #ui, #joystick-zone, #look-zone, #action-zone, #overlay { display: none !important; }
            canvas { display: none !important; }
        }

        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 150px;
            height: 150px;
            z-index: 10;
        }
        #joystick-base {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
        }

        #look-zone {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            z-index: 5;
        }

        #action-zone {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 10;
        }
        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.92);
        }
        .light-off {
            background: rgba(255, 0, 0, 0.3) !important;
            border-color: rgba(255, 0, 0, 0.6) !important;
        }

        /* Charger hint UI */
        #charger-hint {
            position: absolute;
            bottom: 140px;
            right: 30px;
            color: #00ffff;
            font-size: 1rem;
            font-weight: bold;
            z-index: 10;
            text-shadow: 0 0 8px #00ffff;
            pointer-events: none;
            display: none;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }
        #overlay h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 2px; text-align: center; }
        #start-btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            background: white;
            color: black;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
        }
        #message { font-size: 1.1rem; margin-bottom: 10px; text-align: center; padding: 0 30px; opacity: 0.8; }
    </style>
</head>
<body>

    <!-- บังหมุนจอเป็นแนวนอน -->
    <div id="rotate-overlay">
        <div class="icon">📱</div>
        <div style="margin-top:20px">กรุณาหมุนจอเป็นแนวนอน<br>เพื่อเล่นเกมนี้</div>
    </div>

    <div id="ui">
        <div id="timer">🔋 100%</div>
    </div>

    <div id="overlay">
        <h1 id="title">DARK MAZE</h1>
        <div id="message">หาทางออกสีขาว<br>⚡ หาปลั๊กชาร์จแบตไฟฉายให้เจอ!</div>
        <button id="start-btn">เริ่มเกม</button>
    </div>

    <div id="charger-hint">⚡ กดไฟฉายเพื่อชาร์จ!</div>

    <!-- โซนสำหรับทัชสกรีน -->
    <div id="look-zone"></div>
    <div id="joystick-zone">
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>
    <div id="action-zone">
        <div class="action-btn" id="btn-flashlight">🔦</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- Configuration ---
        const MAZE_SIZE = 25;           // ขยายแมพ
        const CELL_SIZE = 5;
        const PLAYER_MAX_SPEED = 0.07;  // เดินช้าลง
        const LOOK_SENSITIVITY = 0.010;

        // Battery system
        let battery = 120;
        let maxBattery = 120;

        // Charger system
        let chargers = [];
        let nearCharger = null;

        // Charge sound
        const chargeSound = new Audio("charge.mp3");

        let scene, camera, renderer, clock;
        let player = {
            pos: new THREE.Vector3(0, 1.6, 0),
            rot: 0,
            pitch: 0,
            radius: 0.6,
            light: null,
            isLightOn: true
        };
        let mazeData = [];
        let walls = [];
        let goalBox;
        let gameActive = false;

        // Joystick & Touch Data
        let joyX = 0;
        let joyY = 0;
        let joyTouchId = null;
        let lookTouchId = null;
        let lastLookX = 0;
        let lastLookY = 0;

        function generateMaze(size) {
            let maze = Array(size).fill().map(() => Array(size).fill(1));
            function walk(x, y) {
                maze[y][x] = 0;
                let dirs = [[0, 2], [0, -2], [2, 0], [-2, 0]].sort(() => Math.random() - 0.5);
                for (let [dx, dy] of dirs) {
                    let nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < size && ny > 0 && ny < size && maze[ny][nx] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        walk(nx, ny);
                    }
                }
            }
            walk(1, 1);
            maze[size-1][size-2] = 2; // Exit

            // สร้างทางหลอก (fake dead ends) เพิ่มความงง
            for (let i = 0; i < 20; i++) {
                let x = Math.floor(Math.random() * MAZE_SIZE);
                let y = Math.floor(Math.random() * MAZE_SIZE);
                if (maze[y][x] !== 2) { // ไม่เขียนทับทางออก
                    maze[y][x] = 0;
                }
            }

            return maze;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.Fog(0x000000, 1, 14); // หมอกหนาขึ้น

            camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 1000);
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.08);
            scene.add(ambientLight);

            // ไฟฉาย (SpotLight) ผูกติดกับ Camera
            const flashlight = new THREE.SpotLight(0xffffff, 1.6);
            flashlight.angle = Math.PI / 6;
            flashlight.penumbra = 0.3;
            flashlight.decay = 1.2;
            flashlight.distance = 35;
            flashlight.position.set(0, -0.2, 0);
            camera.add(flashlight);

            const lightTarget = new THREE.Object3D();
            lightTarget.position.set(0, 0, -5);
            camera.add(lightTarget);
            flashlight.target = lightTarget;

            player.light = flashlight;

            const textureLoader = new THREE.TextureLoader();
            const wallTexture = textureLoader.load("color.jpg");
            const floorTexture = textureLoader.load("floor.jpg");

            wallTexture.wrapS = wallTexture.wrapT = THREE.RepeatWrapping;
            floorTexture.wrapS = floorTexture.wrapT = THREE.RepeatWrapping;
            floorTexture.repeat.set(20, 20);
            wallTexture.repeat.set(2, 2);

            const wallMat = new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 1, metalness: 0 });
            const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture, roughness: 0.9 });
            const goalMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            mazeData = generateMaze(MAZE_SIZE);

            const wallGeo = new THREE.BoxGeometry(CELL_SIZE, 5, CELL_SIZE);
            const floorGeo = new THREE.PlaneGeometry(MAZE_SIZE * CELL_SIZE * 2, MAZE_SIZE * CELL_SIZE * 2);

            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            for (let y = 0; y < MAZE_SIZE; y++) {
                for (let x = 0; x < MAZE_SIZE; x++) {
                    let posX = x * CELL_SIZE;
                    let posZ = y * CELL_SIZE;

                    if (mazeData[y][x] === 1) {
                        const wall = new THREE.Mesh(wallGeo, wallMat);
                        wall.position.set(posX, 2.5, posZ);
                        scene.add(wall);
                        walls.push(new THREE.Box3().setFromObject(wall));
                    } else if (mazeData[y][x] === 2) {
                        const goal = new THREE.Mesh(new THREE.BoxGeometry(CELL_SIZE * 0.9, 5, CELL_SIZE * 0.9), goalMat);
                        goal.position.set(posX, 2.5, posZ);
                        scene.add(goal);
                        goalBox = new THREE.Box3().setFromObject(goal);

                        const goalLight = new THREE.PointLight(0xffffff, 2, 15);
                        goalLight.position.set(posX, 3, posZ);
                        scene.add(goalLight);
                    }
                }
            }

            // สร้างและวางปลั๊กชาร์จ 3 จุด
            const chargerGeo = new THREE.BoxGeometry(1, 1, 1);
            const chargerMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });

            let placed = 0;
            let attempts = 0;
            while (placed < 3 && attempts < 1000) {
                attempts++;
                let x = Math.floor(Math.random() * MAZE_SIZE);
                let y = Math.floor(Math.random() * MAZE_SIZE);
                // วางได้เฉพาะบนทางเดิน และไม่ใช่จุดเริ่มต้น
                if (mazeData[y][x] === 0 && !(x === 1 && y === 1)) {
                    let charger = new THREE.Mesh(chargerGeo, chargerMat);
                    charger.position.set(x * CELL_SIZE, 0.5, y * CELL_SIZE);
                    scene.add(charger);
                    chargers.push(charger);

                    // ไฟเรืองรอบปลั๊ก
                    const cLight = new THREE.PointLight(0x00ffff, 1.5, 8);
                    cLight.position.copy(charger.position);
                    cLight.position.y = 1;
                    scene.add(cLight);

                    placed++;
                }
            }

            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize);

            setupJoystick();
            setupLookZone();
            setupFlashlightBtn();

            document.getElementById('start-btn').addEventListener('click', startGame);

            animate();
        }

        // --- ระบบหันกล้อง ---
        function setupLookZone() {
            const lookZone = document.getElementById('look-zone');

            lookZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (lookTouchId !== null) return;
                const touch = e.changedTouches[0];
                lookTouchId = touch.identifier;
                lastLookX = touch.clientX;
                lastLookY = touch.clientY;
            });

            lookZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === lookTouchId) {
                        const touch = e.changedTouches[i];
                        const dx = touch.clientX - lastLookX;
                        const dy = touch.clientY - lastLookY;
                        player.rot -= dx * LOOK_SENSITIVITY;
                        player.pitch -= dy * LOOK_SENSITIVITY;
                        const maxPitch = Math.PI / 2.1;
                        player.pitch = Math.max(-maxPitch, Math.min(maxPitch, player.pitch));
                        lastLookX = touch.clientX;
                        lastLookY = touch.clientY;
                        break;
                    }
                }
            });

            const endLook = (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === lookTouchId) {
                        lookTouchId = null;
                        break;
                    }
                }
            };
            lookZone.addEventListener('touchend', endLook);
            lookZone.addEventListener('touchcancel', endLook);

            let isMouseLooking = false;
            lookZone.addEventListener('mousedown', (e) => {
                isMouseLooking = true;
                lastLookX = e.clientX;
                lastLookY = e.clientY;
            });
            window.addEventListener('mousemove', (e) => {
                if (!isMouseLooking) return;
                const dx = e.clientX - lastLookX;
                const dy = e.clientY - lastLookY;
                player.rot -= dx * LOOK_SENSITIVITY;
                player.pitch -= dy * LOOK_SENSITIVITY;
                player.pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, player.pitch));
                lastLookX = e.clientX;
                lastLookY = e.clientY;
            });
            window.addEventListener('mouseup', () => isMouseLooking = false);
        }

        // --- Virtual Joystick ---
        function setupJoystick() {
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            const base = document.getElementById('joystick-base');

            let baseCenterX, baseCenterY;
            let maxRadius = base.offsetWidth / 2;

            function updateBaseCenter() {
                const rect = base.getBoundingClientRect();
                baseCenterX = rect.left + rect.width / 2;
                baseCenterY = rect.top + rect.height / 2;
                maxRadius = rect.width / 2;
            }

            function handleMove(clientX, clientY) {
                let dx = clientX - baseCenterX;
                let dy = clientY - baseCenterY;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > maxRadius) {
                    dx = (dx / distance) * maxRadius;
                    dy = (dy / distance) * maxRadius;
                }
                stick.style.transition = 'none';
                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joyX = dx / maxRadius;
                joyY = dy / maxRadius;
            }

            function resetJoystick() {
                joyX = 0; joyY = 0; joyTouchId = null;
                stick.style.transition = 'transform 0.1s ease-out';
                stick.style.transform = `translate(-50%, -50%)`;
            }

            zone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (joyTouchId !== null) return;
                updateBaseCenter();
                const touch = e.changedTouches[0];
                joyTouchId = touch.identifier;
                handleMove(touch.clientX, touch.clientY);
            });

            zone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joyTouchId) {
                        handleMove(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                        break;
                    }
                }
            });

            const handleTouchEnd = (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joyTouchId) {
                        resetJoystick();
                        break;
                    }
                }
            };
            zone.addEventListener('touchend', handleTouchEnd);
            zone.addEventListener('touchcancel', handleTouchEnd);

            let isMouseDown = false;
            zone.addEventListener('mousedown', (e) => {
                isMouseDown = true;
                updateBaseCenter();
                handleMove(e.clientX, e.clientY);
            });
            window.addEventListener('mousemove', (e) => {
                if (isMouseDown) handleMove(e.clientX, e.clientY);
            });
            window.addEventListener('mouseup', () => {
                if (isMouseDown) { isMouseDown = false; resetJoystick(); }
            });
        }

        // --- ปุ่มไฟฉาย ---
        function setupFlashlightBtn() {
            const btn = document.getElementById('btn-flashlight');
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); toggleLight(); });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); toggleLight(); });
        }

        function toggleLight() {
            // ถ้าอยู่ใกล้ปลั๊ก → ชาร์จแทนการสลับไฟ
            if (nearCharger) {
                battery = maxBattery;
                try { chargeSound.currentTime = 0; chargeSound.play(); } catch(e) {}
                // Flash effect feedback
                player.isLightOn = true;
                player.light.visible = true;
                player.light.intensity = 2.5;
                setTimeout(() => { if(player.light) player.light.intensity = 1.6; }, 300);
                document.getElementById('btn-flashlight').classList.remove('light-off');
                return;
            }

            // ปิด/เปิดไฟปกติ
            player.isLightOn = !player.isLightOn;
            player.light.visible = player.isLightOn;
            const btn = document.getElementById('btn-flashlight');
            if (player.isLightOn) {
                btn.classList.remove('light-off');
            } else {
                btn.classList.add('light-off');
            }
        }

        function startGame() {
            battery = maxBattery;
            gameActive = true;
            player.pos.set(CELL_SIZE, 1.6, CELL_SIZE);
            player.rot = 0;
            player.pitch = 0;
            document.getElementById('overlay').style.display = 'none';
            player.isLightOn = true;
            player.light.visible = true;
            player.light.intensity = 1.6;
            document.getElementById('btn-flashlight').classList.remove('light-off');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function checkCollision(newPos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(
                newPos,
                new THREE.Vector3(player.radius * 2, 1, player.radius * 2)
            );
            for (let wall of walls) {
                if (playerBox.intersectsBox(wall)) return true;
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) return;

            const delta = clock.getDelta();

            // ลดแบตตอนเปิดไฟ
            if (player.isLightOn) {
                battery -= delta;
                if (battery <= 0) {
                    battery = 0;
                    player.isLightOn = false;
                    player.light.visible = false;
                    document.getElementById('btn-flashlight').classList.add('light-off');
                }
            }

            // อัปเดต UI แบต
            const pct = Math.floor((battery / maxBattery) * 100);
            const battColor = pct > 30 ? (pct > 60 ? '#00ff88' : '#ffcc00') : '#ff4444';
            document.getElementById('timer').innerHTML =
                `<span style="color:${battColor}">🔋 ${pct}%</span>`;

            // ไฟกระพริบตอนแบตใกล้หมด
            if (battery < 20 && player.isLightOn) {
                player.light.intensity = 1.2 + Math.sin(performance.now() * 0.02) * 0.5;
            } else if (player.isLightOn) {
                player.light.intensity = 1.6;
            }

            // ตรวจสอบว่าอยู่ใกล้ปลั๊กชาร์จ
            nearCharger = null;
            chargers.forEach(c => {
                const dist = player.pos.distanceTo(c.position);
                if (dist < 3) {
                    nearCharger = c;
                }
            });

            // แสดง/ซ่อน hint ชาร์จ
            document.getElementById('charger-hint').style.display = nearCharger ? 'block' : 'none';

            // หมุนปลั๊กชาร์จ (animation)
            chargers.forEach(c => { c.rotation.y += delta * 1.5; });

            // --- การเคลื่อนที่ ---
            if (Math.abs(joyX) > 0.1 || Math.abs(joyY) > 0.1) {
                let fwdX = -Math.sin(player.rot);
                let fwdZ = -Math.cos(player.rot);
                let rightX = -Math.sin(player.rot - Math.PI / 2);
                let rightZ = -Math.cos(player.rot - Math.PI / 2);

                let moveFwd = -joyY * PLAYER_MAX_SPEED;
                let moveRight = joyX * PLAYER_MAX_SPEED;

                let dx = (fwdX * moveFwd) + (rightX * moveRight);
                let dz = (fwdZ * moveFwd) + (rightZ * moveRight);

                let nextPos = player.pos.clone();

                nextPos.x += dx;
                if (!checkCollision(nextPos)) {
                    player.pos.x += dx;
                } else {
                    nextPos.x = player.pos.x;
                }

                nextPos.z += dz;
                if (!checkCollision(nextPos)) {
                    player.pos.z += dz;
                }
            }

            camera.position.copy(player.pos);
            camera.rotation.set(player.pitch, player.rot, 0, 'YXZ');

            // ตรวจสอบชัยชนะ
            const playerBox = new THREE.Box3().setFromCenterAndSize(player.pos, new THREE.Vector3(1, 1, 1));
            if (goalBox && playerBox.intersectsBox(goalBox)) {
                endGame(true);
            }

            renderer.render(scene, camera);
        }

        function endGame(win) {
            gameActive = false;
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('title');
            const msg = document.getElementById('message');

            overlay.style.display = 'flex';
            if (win) {
                title.innerText = "VICTORY";
                msg.innerText = "ยินดีด้วย! คุณรอดพ้นจากเขาวงกต";
            } else {
                title.innerText = "GAME OVER";
                msg.innerText = "ความมืดกลืนกินคุณ... ลองใหม่อีกครั้ง";
            }
            document.getElementById('start-btn').innerText = "เล่นอีกครั้ง";
        }

        window.onload = init;
    </script>
</body>
</html>
